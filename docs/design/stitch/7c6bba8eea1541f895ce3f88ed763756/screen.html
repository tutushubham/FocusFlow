<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2060df",
                "background-light": "#f6f6f8",
                "background-dark": "#111621",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200/50 dark:bg-slate-800/50">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Focus Flow</h2>
<div class="w-10 h-10 flex items-center justify-center rounded-full">
<span class="text-primary font-semibold text-sm">Skip</span>
</div>
</div>
<!-- Illustration Area -->
<div class="flex w-full grow items-center justify-center p-8">
<div class="w-full aspect-square rounded-full bg-primary/10 flex items-center justify-center relative">
<div class="w-4/5 h-4/5 bg-center bg-no-repeat bg-cover rounded-xl shadow-lg border-4 border-white dark:border-slate-800" data-alt="Students collaborating and studying together happily" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA7eMcVzW9WpObp91QF8jopp1qt454nMhlWNX67XBsiMLIiO0x-y1OUdhCJftQBlFpeVoIJ1wp7xQd8Fq2azQUQZaLE15zVDy-16YS7NsEBC0ttc9HBt9B2x2HHNPVXTuB-_dcTatbAFie6vQvopVn679oyAFz-We8Sk6BpDYDOW7MiS2yYUZcIgMvlEhuaYE92KtZ1vIcJSaL636U5GPWvev8hOkV96Pw25HhtW0hOQ9yBSrhoPEmzZqVmft0L-NzgEq2VrIoNoEjW");'>
</div>
<!-- Floating Accent Elements -->
<div class="absolute -top-4 -right-4 bg-white dark:bg-slate-800 p-3 rounded-xl shadow-md">
<span class="material-symbols-outlined text-primary">groups</span>
</div>
<div class="absolute -bottom-2 -left-2 bg-white dark:bg-slate-800 p-3 rounded-xl shadow-md">
<span class="material-symbols-outlined text-primary">schedule</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="px-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight text-center pb-4">
                Find Your Perfect Study Partner
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center">
                Connect with students worldwide who share your goals and study schedules.
            </p>
</div>
<!-- Pagination Dots -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-2.5 w-6 rounded-full bg-primary"></div>
<div class="h-2.5 w-2.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2.5 w-2.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2.5 w-2.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Action Button -->
<div class="p-8 pt-2 pb-12 w-full">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all">
<span>Next</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
