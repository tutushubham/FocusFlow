<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2060df",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Focus Flow</h2>

<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-6">

<div class="absolute inset-0 bg-gradient-to-t from-background-light/80 dark:from-background-dark/80 to-transparent"></div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="flex-1 flex flex-col justify-center px-6 pt-10 pb-8">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-3">
                Ready to Focus?
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed pb-8 px-4 text-center">
                Your journey towards better study habits starts now. Join thousands of students improving their productivity.
            </p>
<!-- Pagination Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-1.5 w-1.5 rounded-full bg-primary/20 dark:bg-primary/30"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20 dark:bg-primary/30"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20 dark:bg-primary/30"></div>
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
</div>
</div>

<div class="px-6 pb-12 w-full max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
