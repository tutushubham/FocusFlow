<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Focus Flow Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2060df",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Focus Flow</h2>
</div>
<!-- Progress Stepper -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-5">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-8 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
</div>
<!-- Main Illustration Content -->
<div class="flex flex-col flex-1 px-8 justify-center items-center">
<div class="relative w-full aspect-square max-w-[280px] bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 flex flex-col justify-between overflow-hidden">
<!-- Progress Chart Placeholder -->
<div class="flex items-end justify-between h-32 gap-2 mb-4">
<div class="w-full bg-primary/10 rounded-t-lg h-1/2"></div>
<div class="w-full bg-primary/20 rounded-t-lg h-2/3"></div>
<div class="w-full bg-primary/10 rounded-t-lg h-1/3"></div>
<div class="w-full bg-primary/40 rounded-t-lg h-3/4"></div>
<div class="w-full bg-primary rounded-t-lg h-full"></div>
</div>
<!-- Flame Icon / Streak Badge -->
<div class="flex items-center justify-center gap-3 bg-primary/5 dark:bg-primary/20 py-3 rounded-lg">
<span class="material-symbols-outlined text-primary text-3xl fill-1">local_fire_department</span>
<div class="flex flex-col">
<span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Current Streak</span>
<span class="text-xl font-bold text-slate-900 dark:text-slate-100">12 Days</span>
</div>
</div>
<!-- Abstract background decoration -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
</div>
</div>
<!-- Text Content -->
<div class="px-8 pt-8 text-center">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight pb-4">Stay Accountable</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                Track your study hours, maintain daily streaks, and watch your progress grow.
            </p>
</div>
<!-- Action Button -->
<div class="p-8 mt-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all">
                Next
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<button class="w-full mt-4 text-slate-400 dark:text-slate-500 font-medium py-2">
                Skip
            </button>
</div>
<!-- Decorative spacer for bottom spacing -->
<div class="h-6"></div>
</div>
</body></html>
